site_name: "⚡ TechBase"
site_description: Notes techniques Intune, M365, Datto, Entra ID, Graph
site_url: https://robertcotton13670-alt.github.io/kb/

extra_css:
  - assets/extra.css

theme:
  name: material
  language: fr
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Mode clair
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Mode sombre
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang: fr

nav:
  - Intune:
      - Vue d'ensemble: intune/autopilot.md
      - Hardware Hash: intune/autopilot-hash.md
  - Datto RMM:
      - Toast Notifications: DAtto/Toast notif depuis datto.md
  - Microsoft 365: index.md
  - Entra ID: index.md
  - Microsoft Graph: index.md
  - Workflow KB:
      - Setup et commandes: workflow/kb-setup.md
