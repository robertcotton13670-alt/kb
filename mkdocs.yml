site_name: "⚡ TechBase"
site_description: Notes techniques Intune, M365, Datto, Entra ID, Graph
site_url: https://robertcotton13670-alt.github.io/kb/
repo_url: https://github.com/robertcotton13670-alt/kb
repo_name: robertcotton13670-alt/kb

extra_css:
  - assets/extra.css

theme:
  name: material
  language: fr
  palette:
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Mode clair
    - scheme: default
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Mode sombre
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang: fr

nav:
  - Accueil: index.md
  - Intune:
    - Vue d'ensemble: intune/index.md
    - Autopilot: intune/autopilot.md
    - Hash Autopilot: intune/autopilot-hash.md
    - LAPS: intune/laps.md
    - Reset / Wipe: intune/reset-wipe.md
    - Imprimantes (PrintServerToIntune): intune/imprimantes-intune-printservertointune.md
    - Winget — Déploiement Intune: intune/winget-deploy-intune.md
    - Bonnes pratiques MSP: intune/best-practices-msp.md
  - Datto RMM:
    - Vue d'ensemble: datto/index.md
    - Toast Notifications: datto/Toast notif depuis datto.md
    - Audit OneDrive / SharePoint V3: datto/audit-onedrive-sharepoint-v3.md
  - Microsoft 365:
    - Vue d'ensemble: m365/index.md
    - Scan-to-email via SMTP2GO: m365/smtp2go-scan-to-email.md
    - Raccourcis OneDrive par groupe: m365/onedrive-shortcuts-groupe.md
  - Entra ID: entra/index.md
  - Commandes & Références:
    - Vue d'ensemble: refs/index.md
    - dsregcmd: refs/dsregcmd.md
    - ipconfig: refs/ipconfig.md
    - winget: refs/winget.md
    - Get-WindowsAutopilotInfo: refs/autopilot-hash.md
    - RDS — Sessions: refs/rds-sessions.md
  - PowerAcademy:
    - Vue d'ensemble: poweracademy/index.md
    - Présentation MySérenité: poweracademy/myserenity-presentation.md
    - Authentification: poweracademy/myserenity-authentification.md
    - Cybersécurité: poweracademy/myserenity-cybersecurite.md
    - Exchange / Outlook: poweracademy/myserenity-exchange-outlook.md
    - FAQ: poweracademy/myserenity-faq.md
    - Keeper: poweracademy/myserenity-keeper.md
    - OneDrive: poweracademy/myserenity-onedrive.md
    - Outils complémentaires: poweracademy/myserenity-outils-complementaires.md
    - SharePoint: poweracademy/myserenity-sharepoint.md
    - Support: poweracademy/myserenity-support.md
    - Teams: poweracademy/myserenity-teams.md
    - Vade: poweracademy/myserenity-vade.md
    - Glossaire M365: poweracademy/glossaire-m365.md
    - Glossaire Sécurité: poweracademy/glossaire-securite.md
